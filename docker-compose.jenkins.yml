# ======================================================================
# Jenkins with Docker-in-Docker (DinD) Local Setup
# ======================================================================
# Installation Instructions:
# 1. Open your terminal in the directory containing this file.
# 2. Start the Jenkins and DinD services in the background by running:
#    docker compose -f docker-compose.jenkins.yml up -d
# 3. Wait a few moments for the containers to initialize.
# 4. Access the Jenkins web interface in your browser at:
#    http://localhost:8080
# 5. Note: The initial setup wizard is disabled via JAVA_OPTS.
#    You're dropped straight in, but may need to manually install 
#    the Docker Pipeline plugins via the Manage Jenkins UI.
# 6. To shut down the services and preserve your data, run:
#    docker compose -f docker-compose.jenkins.yml down
# ======================================================================

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    # Running as root is often required inside the container to access the docker socket
    user: root
    privileged: true
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount Docker socket allowing Jenkins to use host's Docker engine
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins_network
    # Install docker CLI inside Jenkins container
    entrypoint: >
      bash -c "
      apt-get update &&
      apt-get install -y docker.io &&
      /usr/bin/tini -- /usr/local/bin/jenkins.sh
      "

networks:
  jenkins_network:
    driver: bridge

volumes:
  jenkins_home:
