services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urbanbank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - urbanbank_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urbanbank"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    env_file:
      - ./Backend/.env
    environment:
      # Use "db" instead of "localhost" to resolve via Docker's internal DNS
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/urbanbank
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Wait for DB healthcheck to pass
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  urbanbank_pgdata:
