---
- name: Tear down UrbanBank infrastructure
  hosts: local
  gather_facts: no
  vars:
    k8s_namespace: urbanbank
    remove_images: true
    stop_minikube: false
  tasks:
    - name: Teardown block
      block:
        - name: Delete namespace resources
          ansible.builtin.command: "kubectl delete namespace {{ k8s_namespace }} --ignore-not-found=true"
          changed_when: false

        - name: Delete remaining resources from k8s directory
          ansible.builtin.command: "kubectl delete -f {{ playbook_dir }}/../k8s --ignore-not-found=true"
          changed_when: false

        - name: Remove UrbanBank Docker images
          ansible.builtin.command: "docker rmi {{ item }}"
          loop:
            - urbanbank-backend:latest
            - urbanbank-frontend:latest
            - urbanbank-nginx:latest
          ignore_errors: yes
          when: remove_images | bool

        - name: Optionally stop Minikube
          ansible.builtin.command: minikube stop
          changed_when: false
          when: stop_minikube | bool

      rescue:
        - name: Teardown failed
          ansible.builtin.fail:
            msg: Teardown failed. Check output and clean up manually if required.
