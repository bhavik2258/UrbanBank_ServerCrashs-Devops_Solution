---
- name: Setup server for UrbanBank on Minikube
  hosts: local
  become: yes
  vars:
    required_packages:
      - docker.io
      - docker-compose
      - kubectl
      - git
      - python3-pip
    minikube_binary_url: "https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64"
    minikube_binary_path: "/usr/local/bin/minikube"
    docker_service_name: docker
    effective_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
  handlers:
    - name: Restart docker
      ansible.builtin.service:
        name: "{{ docker_service_name }}"
        state: restarted
    - name: Reload docker
      ansible.builtin.service:
        name: "{{ docker_service_name }}"
        state: reloaded
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ required_packages }}"
        state: present
      when: ansible_os_family == "Debian"
      notify: Restart docker

    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: "{{ docker_service_name }}"
        state: started
        enabled: yes

    - name: Add current user to docker group
      ansible.builtin.user:
        name: "{{ effective_user }}"
        groups: docker
        append: yes
      notify: Reload docker

    - name: Download Minikube binary
      ansible.builtin.get_url:
        url: "{{ minikube_binary_url }}"
        dest: /tmp/minikube-linux-amd64
        mode: "0755"

    - name: Install Minikube binary
      ansible.builtin.copy:
        src: /tmp/minikube-linux-amd64
        dest: "{{ minikube_binary_path }}"
        mode: "0755"
        remote_src: yes

    - name: Start Minikube cluster with docker driver
      ansible.builtin.command: minikube start --driver=docker
      become: no
      changed_when: false

    - name: Enable Minikube ingress addon
      ansible.builtin.command: minikube addons enable ingress
      become: no
      changed_when: false

    - name: Enable Minikube metrics-server addon
      ansible.builtin.command: minikube addons enable metrics-server
      become: no
      changed_when: false
