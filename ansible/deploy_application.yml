---
- name: Deploy UrbanBank application to Minikube
  hosts: local
  gather_facts: yes
  vars:
    project_root: "{{ playbook_dir }}/.."
    k8s_namespace: urbanbank
    backend_dir: "{{ project_root }}/Backend"
    frontend_dir: "{{ project_root }}/Frontend"
    nginx_dir: "{{ project_root }}/nginx"
    manifests:
      - "{{ project_root }}/k8s/namespace.yaml"
      - "{{ project_root }}/k8s/configmap.yaml"
      - "{{ project_root }}/k8s/secret.yaml"
      - "{{ project_root }}/k8s/postgres-pvc.yaml"
      - "{{ project_root }}/k8s/prometheus-pvc.yaml"
      - "{{ project_root }}/k8s/grafana-pvc.yaml"
      - "{{ project_root }}/k8s/postgres-deployment.yaml"
      - "{{ project_root }}/k8s/postgres-service.yaml"
      - "{{ project_root }}/k8s/backend-deployment.yaml"
      - "{{ project_root }}/k8s/backend-service.yaml"
      - "{{ project_root }}/k8s/frontend-deployment.yaml"
      - "{{ project_root }}/k8s/frontend-service.yaml"
      - "{{ project_root }}/k8s/prometheus-config.yaml"
      - "{{ project_root }}/k8s/prometheus-deployment.yaml"
      - "{{ project_root }}/k8s/prometheus-service.yaml"
      - "{{ project_root }}/k8s/grafana-datasource-config.yaml"
      - "{{ project_root }}/k8s/grafana-dashboard-provider.yaml"
      - "{{ project_root }}/k8s/grafana-dashboard-config.yaml"
      - "{{ project_root }}/k8s/grafana-deployment.yaml"
      - "{{ project_root }}/k8s/grafana-service.yaml"
      - "{{ project_root }}/k8s/backend-hpa.yaml"
      - "{{ project_root }}/k8s/backend-pdb.yaml"
      - "{{ project_root }}/k8s/frontend-pdb.yaml"
      - "{{ project_root }}/k8s/postgres-pdb.yaml"
      - "{{ project_root }}/k8s/ingress.yaml"
  tasks:
    - name: Deploy block
      block:
        - name: Resolve nginx build directory
          ansible.builtin.set_fact:
            resolved_nginx_dir: "{{ nginx_dir if lookup('ansible.builtin.fileglob', nginx_dir ~ '/Dockerfile') | length > 0 else frontend_dir }}"

        - name: Build backend image
          ansible.builtin.command: "docker build -t urbanbank-backend:latest {{ backend_dir }}"

        - name: Build frontend image
          ansible.builtin.command: "docker build -t urbanbank-frontend:latest {{ frontend_dir }}"

        - name: Build nginx image
          ansible.builtin.command: "docker build -t urbanbank-nginx:latest {{ resolved_nginx_dir }}"

        - name: Load images into Minikube
          ansible.builtin.command: "minikube image load {{ item }}"
          loop:
            - urbanbank-backend:latest
            - urbanbank-frontend:latest
            - urbanbank-nginx:latest

        - name: Apply manifests in order
          ansible.builtin.command: "kubectl apply -f {{ item }}"
          loop: "{{ manifests }}"

        - name: Wait for postgres rollout
          ansible.builtin.command: "kubectl rollout status deployment/postgres -n {{ k8s_namespace }} --timeout=240s"
          changed_when: false

        - name: Wait for backend rollout
          ansible.builtin.command: "kubectl rollout status deployment/backend -n {{ k8s_namespace }} --timeout=240s"
          changed_when: false

        - name: Wait for frontend rollout
          ansible.builtin.command: "kubectl rollout status deployment/frontend -n {{ k8s_namespace }} --timeout=240s"
          changed_when: false

        - name: Wait for prometheus rollout
          ansible.builtin.command: "kubectl rollout status deployment/prometheus -n {{ k8s_namespace }} --timeout=240s"
          changed_when: false

        - name: Wait for grafana rollout
          ansible.builtin.command: "kubectl rollout status deployment/grafana -n {{ k8s_namespace }} --timeout=240s"
          changed_when: false

        - name: Health check backend
          ansible.builtin.command: "kubectl exec -n {{ k8s_namespace }} deploy/backend -- curl -fsS http://127.0.0.1:8000/health"
          changed_when: false

        - name: Capture service URLs
          ansible.builtin.command: "minikube service {{ item.service }} --url -n {{ k8s_namespace }}"
          loop:
            - { name: 'frontend_url', service: 'frontend' }
            - { name: 'grafana_url', service: 'grafana' }
            - { name: 'prometheus_url', service: 'prometheus' }
          register: service_urls
          changed_when: false

        - name: Show service URLs
          ansible.builtin.debug:
            msg: "{{ item.item.name }} => {{ item.stdout }}"
          loop: "{{ service_urls.results }}"

      rescue:
        - name: Deployment failed
          ansible.builtin.fail:
            msg: Deployment failed. Check previous task output for root cause.
