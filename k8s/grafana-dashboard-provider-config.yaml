apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider-config
  namespace: urbanbank
  labels:
    app: grafana
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: urbanbank
        orgId: 1
        folder: UrbanBank
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 15
        options:
          path: /var/lib/grafana/dashboards/urbanbank
