apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-config
  namespace: urbanbank
  labels:
    app: grafana
data:
  alerting.yaml: |
    apiVersion: 1

    contactPoints:
      - orgId: 1
        name: UrbanBank Webhook
        receivers:
          - uid: urbanbank-webhook
            type: webhook
            disableResolveMessage: false
            settings:
              url: http://backend:8000/alerts/webhooks/grafana

    policies:
      - orgId: 1
        receiver: UrbanBank Webhook
        group_by: ["alertname", "grafana_folder"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h