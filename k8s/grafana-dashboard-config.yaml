apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config
  namespace: urbanbank
  labels:
    app: grafana
    grafana_dashboard: "1"
data:
  urbanbank-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            { "expr": "sum(branch_status_current)", "refId": "A" }
          ],
          "title": "Total Branches",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 4, "x": 6, "y": 0 },
          "id": 2,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "branch_status_current{status=\"healthy\"}", "refId": "A" }],
          "title": "Healthy Branches",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 4, "x": 10, "y": 0 },
          "id": 3,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "branch_status_current{status=\"warning\"}", "refId": "A" }],
          "title": "Warning Branches",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "min": 0, "max": 100, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 4, "x": 14, "y": 0 },
          "id": 4,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "branch_status_current{status=\"critical\"}", "refId": "A" }],
          "title": "Critical Branches",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "id": 5,
          "targets": [{ "expr": "rate(incident_created_total[5m])", "refId": "A" }],
          "title": "Incidents Created",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "id": 6,
          "targets": [{ "expr": "active_incidents", "refId": "A" }],
          "title": "Active Incidents",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "id": 7,
          "targets": [{ "expr": "rate(http_requests_total[5m])", "refId": "A" }],
          "title": "HTTP Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "ms" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "id": 8,
          "targets": [{ "expr": "histogram_quantile(0.95, http_request_duration_seconds_bucket)", "refId": "A" }],
          "title": "API Response Time p95",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "id": 9,
          "targets": [{ "expr": "topk(10, sum by (handler, method) (rate(http_requests_total[5m])))", "refId": "A" }],
          "title": "Request by Endpoint",
          "type": "table"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 24 },
          "id": 10,
          "targets": [{ "expr": "rate(http_requests_total{status=~\"5..\"}[5m])", "refId": "A" }],
          "title": "Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 24 },
          "id": 11,
          "targets": [{ "expr": "rate(container_cpu_usage_seconds_total[5m])", "refId": "A" }],
          "title": "CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 24 },
          "id": 12,
          "targets": [{ "expr": "container_memory_usage_bytes", "refId": "A" }],
          "title": "Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 32 },
          "id": 13,
          "targets": [{ "expr": "rate(container_fs_io_time_seconds_total[5m])", "refId": "A" }],
          "title": "Disk I/O",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "bps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 32 },
          "id": 14,
          "targets": [{ "expr": "rate(container_network_transmit_bytes_total[5m])", "refId": "A" }],
          "title": "Network Traffic",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 32 },
          "id": 15,
          "targets": [{ "expr": "node_procs_running", "refId": "A" }],
          "title": "Active Connections",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 40 },
          "id": 16,
          "targets": [{ "expr": "histogram_quantile(0.95, rate(pg_stat_statement_duration_seconds_bucket[5m]))", "refId": "A" }],
          "title": "Query Duration",
          "type": "heatmap"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 40 },
          "id": 17,
          "targets": [{ "expr": "rate(pg_stat_database_xact_commit[5m]) + rate(pg_stat_database_xact_rollback[5m])", "refId": "A" }],
          "title": "Transaction Rate",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["urbanbank", "prometheus", "bank-ops"],
      "templating": { "list": [] },
      "timezone": "browser",
      "title": "UrbanBank Dashboard",
      "uid": "urbanbank-dashboard",
      "version": 1
    }
