apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: urbanbank
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: urbanbank-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: urbanbank-secrets
                  key: DATABASE_URL
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: urbanbank-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: urbanbank-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: urbanbank-config
                  key: DATABASE_NAME
            - name: METRIC_COLLECTION_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: urbanbank-config
                  key: METRIC_COLLECTION_INTERVAL_SECONDS
            - name: BRANCH_AUTO_HEAL_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: urbanbank-config
                  key: BRANCH_AUTO_HEAL_INTERVAL_SECONDS
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
