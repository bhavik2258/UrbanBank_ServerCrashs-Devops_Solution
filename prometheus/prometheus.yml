global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "urbanbank-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "urbanbank-postgres"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]
